services:
  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agentdb_internal

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    restart: unless-stopped
    # Model pre-downloaded to VPS: /docker/agentdb/models/bge-base-en-v1.5
    # Download: docker run --rm -v /docker/agentdb/models:/models python:3.11-slim bash -c \
    #   'pip install -q huggingface_hub && python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id=\"BAAI/bge-base-en-v1.5\", local_dir=\"/models/bge-base-en-v1.5\")"'
    command: --model-id /models/bge-base-en-v1.5 --port 80
    volumes:
      - /docker/agentdb/models:/models:ro
    networks:
      - agentdb_internal

  agentdb-api:
    build: ./agentdb-api
    restart: unless-stopped
    environment:
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_URL: http://embedding:80
      AGENTDB_API_KEY: ${AGENTDB_API_KEY}
      PORT: 3100
    networks:
      - agentdb_internal
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.agentdb.rule=Host(`${AGENTDB_HOST}`)"
      - "traefik.http.routers.agentdb.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.agentdb.tls=true"
      - "traefik.http.routers.agentdb.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-mytlschallenge}"
      - "traefik.http.services.agentdb.loadbalancer.server.port=3100"
    depends_on:
      - qdrant
      - embedding

volumes:
  qdrant_data:

networks:
  agentdb_internal:
    driver: bridge
  traefik_net:
    external: true
    name: ${TRAEFIK_NETWORK:-n8n_default}
